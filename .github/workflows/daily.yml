name: daily-ingest

# Runs Sunday to Thursday at 12:30 UTC (15:30 AST), after the 15:00 AST close has
# settled. GitHub cron is always UTC; day-of-week 0-4 is Sunday through Thursday.
on:
  schedule:
    - cron: "30 12 * * 0-4"
  workflow_dispatch: {}

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run daily ingest
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/daily.py
