name: daily-ingest

# Runs Sunday to Thursday at 12:30 UTC (15:30 AST), after the 15:00 AST close has
# settled. GitHub cron is always UTC; day-of-week 0-4 is Sunday through Thursday.
on:
  schedule:
    - cron: "30 12 * * 0-4"
  workflow_dispatch: {}

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SAHMK_API_KEY: ${{ secrets.SAHMK_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run daily ingest
        run: python scripts/daily.py

      # Refresh the live current-price quotes from Sahmk once a day. Throttled to stay
      # under the free-tier limit (100/day, 10/min) and idempotent, so it just refreshes
      # live_quotes. continue-on-error so a quote-API hiccup never fails the price job;
      # the app falls back to the end-of-day close when a symbol has no live quote. The
      # step is skipped until the SAHMK_API_KEY secret is set.
      - name: Refresh live prices (Sahmk)
        if: ${{ env.SAHMK_API_KEY != '' }}
        continue-on-error: true
        run: python scripts/live_prices.py
